  <button class="Botao-Refund">

  <main class="container">
    <div class="Caixa-Um">
      <!-- ID adicionado ao formulário para capturar o evento de submit -->
      <form id="form-refund">
    
        <h1>Solicitação de Reembolso</h1>
        <p>Informe os dados da despesa para solicitar reembolso. A despesa será analisada e reembolsada em até 30 dias.</p>
  
        <div class="Input-Box">
          <label for="expense-title">Título da despesa</label> 
          <!-- ID adicionado para capturar o nome da despesa -->
          <input type="text" id="expense-title" placeholder="" required>
        </div>
       
        <div class="Input-Box">
          <label for="expense-category">Categoria</label>
          <!-- Mudado para select ou mantido input com ID para capturar a categoria -->
          <select  id="expense-category" required> 
            <option value=""></option>
            <option value="fork-knife">Alimentação</option>
            <option value="bed">Hospedagem</option>
            <option value="taxi">Transporte</option>
            <option value="globe">Serviços</option>
            <option value="book">Outros</option>
          </select>
        </div>
    
        <div class="Input-Box">
          <label for="expense-amount">Valor</label>
          <!-- ID adicionado para capturar o valor numérico -->
          <input type="text" id="expense-amount" placeholder="0,00" required> 
        </div>
     
        <button type="submit" class="Adicionar-despesa" style="margin-top: 20px;">
          <img src="ASSETS/Button.svg" alt="Adicionar despesa">
        </button>
      </form>
    </div>

        <!-- IDs adicionados para atualizar dinamicamente via JS -->

        <strong id="expenses-total"></strong>
      </header>
